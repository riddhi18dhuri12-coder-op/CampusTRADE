<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>List Item - DormKart</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>

body{
font-family:system-ui;
background:#E6FFFA;
margin:0;
}

.header{
background:#14B8A6;
color:white;
padding:16px;
text-align:center;
font-weight:bold;
font-size:18px;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

label{
font-weight:600;
display:block;
margin-top:16px;
}

input,textarea,select{

width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin-top:6px;

}

textarea{
resize:none;
height:100px;
}

.image-preview{
display:flex;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

.image-preview img{
width:80px;
height:80px;
object-fit:cover;
border-radius:6px;
}

.submit-btn{

margin-top:20px;
background:#14B8A6;
color:white;
border:none;
padding:14px;
border-radius:10px;
font-size:16px;
cursor:pointer;
width:100%;

}

.submit-btn:disabled{
opacity:0.6;
}

</style>

</head>

<body>

<div class="header">

List New Item

</div>

<div class="container">

<form id="productForm">

<label>Product Title</label>

<input id="title" required placeholder="e.g. Engineering Mathematics Book">

<label>Description</label>

<textarea id="description" placeholder="Condition, usage details..."></textarea>

<label>Category</label>

<select id="category">

<option value="Books">Books</option>
<option value="Electronics">Electronics</option>
<option value="Furniture">Furniture</option>
<option value="Clothing">Clothing</option>
<option value="Other">Other</option>

</select>

<label>Condition</label>

<select id="condition">

<option value="New">New</option>
<option value="Like New">Like New</option>
<option value="Used">Used</option>

</select>

<label>Price</label>

<input id="price" type="number" required placeholder="500">

<label>Original Price (optional)</label>

<input id="originalPrice" type="number" placeholder="1000">

<label>Upload Images</label>

<input id="images" type="file" multiple accept="image/*">

<div class="image-preview" id="preview"></div>

<button class="submit-btn" id="submitBtn">

Post Item

</button>

</form>

</div>

<script>

const supabaseClient = supabase.createClient(
SUPABASE_CONFIG.url,
SUPABASE_CONFIG.key
);

let currentUser=null;

/* AUTH CHECK */

async function init(){

const {data} = await supabaseClient.auth.getUser();

currentUser=data.user;

if(!currentUser){

location.href="index.html";

}

}

init();


/* IMAGE PREVIEW */

const imageInput=document.getElementById("images");
const preview=document.getElementById("preview");

imageInput.addEventListener("change",()=>{

preview.innerHTML="";

Array.from(imageInput.files).forEach(file=>{

const reader=new FileReader();

reader.onload=e=>{

const img=document.createElement("img");

img.src=e.target.result;

preview.appendChild(img);

};

reader.readAsDataURL(file);

});

});


/* SUBMIT FORM */

document
.getElementById("productForm")
.addEventListener("submit",submitProduct);


async function submitProduct(e){

e.preventDefault();

const btn=document.getElementById("submitBtn");

btn.disabled=true;

btn.innerText="Uploading...";


try{

const title=document.getElementById("title").value;

const description=document.getElementById("description").value;

const category=document.getElementById("category").value;

const condition=document.getElementById("condition").value;

const price=parseFloat(document.getElementById("price").value);

const originalPrice=document.getElementById("originalPrice").value;

const files=imageInput.files;

let imageUrls=[];


/* UPLOAD IMAGES */

for(let file of files){

const filePath=`products/${Date.now()}-${file.name}`;

const {error}=await supabaseClient

.storage

.from("product-images")

.upload(filePath,file);

if(error) throw error;

const {data:urlData}=supabaseClient

.storage

.from("product-images")

.getPublicUrl(filePath);

imageUrls.push(urlData.publicUrl);

}


/* INSERT PRODUCT */

const {error}=await supabaseClient

.from("products")

.insert({

seller_id:currentUser.id,

title:title,

description:description,

category:category,

condition:condition,

price:price,

original_price:originalPrice || null,

image_url:imageUrls[0] || null,

image_urls:imageUrls,

status:"active",

views:0

});

if(error) throw error;

alert("Product listed successfully!");

location.href="dashboard.html";


}catch(err){

alert("Error: "+err.message);

}

btn.disabled=false;

btn.innerText="Post Item";

}

</script>

</body>
</html>
