<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product - DormKart</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>

body{
font-family:Segoe UI;
margin:0;
background:#F8FAFC;
}

.header{
background:#14B8A6;
color:white;
padding:16px;
display:flex;
align-items:center;
gap:10px;
}

.container{
padding:20px;
}

.product-image{
width:100%;
height:260px;
object-fit:cover;
border-radius:10px;
background:#eee;
}

.title{
font-size:22px;
margin-top:15px;
font-weight:bold;
}

.price{
font-size:20px;
color:#14B8A6;
font-weight:bold;
margin-top:6px;
}

.desc{
margin-top:15px;
color:#555;
line-height:1.5;
}

.meta{
margin-top:10px;
font-size:14px;
color:#777;
}

.seller-box{
margin-top:20px;
padding:15px;
background:white;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.btn{
margin-top:15px;
padding:12px;
border:none;
width:100%;
border-radius:8px;
background:#14B8A6;
color:white;
font-size:16px;
cursor:pointer;
}

.rating-box{
margin-top:30px;
background:white;
padding:15px;
border-radius:10px;
}

.review{
border-top:1px solid #eee;
padding:10px 0;
font-size:14px;
}

textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
}

select{
padding:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">
<i class="material-icons" onclick="history.back()" style="cursor:pointer">arrow_back</i>
<h3>Product</h3>
</div>

<div class="container">

<img id="productImage" class="product-image">

<div class="title" id="title"></div>

<div class="price" id="price"></div>

<div class="meta">
<span id="category"></span> • 
<span id="condition"></span>
</div>

<div class="desc" id="description"></div>

<div class="seller-box">

<h4>Seller</h4>

<p id="sellerName">Loading...</p>

<button class="btn" onclick="startChat()">
Chat with Seller
</button>

</div>


<div class="rating-box">

<h3>Ratings & Reviews</h3>

<div id="reviews"></div>

<h4>Add Review</h4>

<select id="rating">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<textarea id="reviewText" placeholder="Write your review"></textarea>

<button class="btn" onclick="submitReview()">Submit Review</button>

</div>

</div>


<script>

const supabaseClient = supabase.createClient(
SUPABASE_CONFIG.url,
SUPABASE_CONFIG.key
)

let productId
let sellerId
let currentUserId


function getProductId(){

const params = new URLSearchParams(window.location.search)

productId = params.get("id")

}

getProductId()



async function checkUser(){

const { data } = await supabaseClient.auth.getSession()

if(!data.session){

window.location="index.html"

return

}

currentUserId = data.session.user.id

}

checkUser()



async function loadProduct(){

const { data } = await supabaseClient
.from("products")
.select("*")
.eq("id",productId)
.single()

sellerId = data.seller_id

document.getElementById("title").innerText = data.title

document.getElementById("price").innerText = "₹" + data.price

document.getElementById("description").innerText = data.description

document.getElementById("category").innerText = data.category

document.getElementById("condition").innerText = data.condition

document.getElementById("productImage").src = data.image_url

loadSeller()

loadReviews()

}

loadProduct()



async function loadSeller(){

const { data } = await supabaseClient
.from("profiles")
.select("full_name")
.eq("id",sellerId)
.single()

document.getElementById("sellerName").innerText =
data?.full_name || "Student"

}



async function startChat(){

const { data: room } = await supabaseClient
.from("rooms")
.select("*")
.eq("user_a",currentUserId)
.eq("user_b",sellerId)
.single()

if(room){

window.location =
"chat-room.html?room="+room.id

return

}

const { data:newRoom } = await supabaseClient
.from("rooms")
.insert([
{
user_a:currentUserId,
user_b:sellerId
}
])
.select()
.single()

window.location =
"chat-room.html?room="+newRoom.id

}



async function loadReviews(){

const { data } = await supabaseClient
.from("ratings")
.select("*")
.eq("product_id",productId)

const container = document.getElementById("reviews")

container.innerHTML=""

if(!data.length){

container.innerHTML="No reviews yet"

return

}

data.forEach(r=>{

container.innerHTML += `
<div class="review">

<strong>${"⭐".repeat(r.rating)}</strong>

<p>${r.review}</p>

</div>
`

})

}



async function submitReview(){

const rating = document.getElementById("rating").value

const review = document.getElementById("reviewText").value

await supabaseClient
.from("ratings")
.insert([
{
product_id:productId,
reviewer_id:currentUserId,
rating:rating,
review:review
}
])

alert("Review submitted")

loadReviews()

}

</script>

</body>
</html>
