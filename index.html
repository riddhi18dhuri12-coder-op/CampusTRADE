<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DormKart - Campus Marketplace</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#F9FAFB;
}

.container{
width:900px;
height:500px;
display:flex;
background:white;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
overflow:hidden;
}

.left{
flex:1;
background:#4F46E5;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.left h1{
font-size:42px;
margin-bottom:10px;
}

.left p{
opacity:0.9;
}

.right{
flex:1;
padding:50px;
}

.tabs{
display:flex;
margin-bottom:25px;
}

.tabs button{
flex:1;
padding:12px;
border:none;
background:#eee;
cursor:pointer;
font-size:15px;
}

.tabs .active{
background:#4F46E5;
color:white;
}

.form{
display:none;
flex-direction:column;
}

.form.active{
display:flex;
}

input{
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
}

button.main{
padding:12px;
border:none;
background:#4F46E5;
color:white;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button.main:hover{
background:#6366F1;
}

</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

</head>

<body>

<div class="container">

<div class="left">
<h1>DormKart</h1>
<p>The Smart Campus Marketplace</p>
</div>

<div class="right">

<div class="tabs">
<button id="loginTab" class="active">Login</button>
<button id="signupTab">Sign Up</button>
</div>

<!-- LOGIN -->
<div id="loginForm" class="form active">

<input type="email" id="loginEmail" placeholder="College Email">

<input type="password" id="loginPassword" placeholder="Password">

<button class="main" onclick="login()">Login</button>

</div>


<!-- SIGNUP -->
<div id="signupForm" class="form">

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="signupEmail" placeholder="College Email">

<input type="password" id="signupPassword" placeholder="Password">

<button class="main" onclick="signup()">Create Account</button>

</div>

</div>

</div>


<script>

// Firebase Config
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID",
appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();


// TAB SWITCH

const loginTab = document.getElementById("loginTab");
const signupTab = document.getElementById("signupTab");

const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");

loginTab.onclick = () => {
loginTab.classList.add("active");
signupTab.classList.remove("active");

loginForm.classList.add("active");
signupForm.classList.remove("active");
};

signupTab.onclick = () => {
signupTab.classList.add("active");
loginTab.classList.remove("active");

signupForm.classList.add("active");
loginForm.classList.remove("active");
};


// LOGIN

function login(){

const email = document.getElementById("loginEmail").value;
const password = document.getElementById("loginPassword").value;

auth.signInWithEmailAndPassword(email,password)
.then(()=>{
alert("Login Successful");
})
.catch(error=>{
alert(error.message);
});

}


// SIGNUP

function signup(){

const email = document.getElementById("signupEmail").value;
const password = document.getElementById("signupPassword").value;

auth.createUserWithEmailAndPassword(email,password)
.then(()=>{
alert("Account Created Successfully");
})
.catch(error=>{
alert(error.message);
});

}

</script>

</body>
</html>
