<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DormKart - Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#F9FAFB;
}

.container{
width:850px;
height:480px;
display:flex;
background:white;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
overflow:hidden;
}

.left{
flex:1;
background:#4F46E5;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.left h1{
font-size:40px;
margin-bottom:10px;
}

.left p{
opacity:0.9;
}

.right{
flex:1;
padding:40px;
}

.tabs{
display:flex;
margin-bottom:20px;
}

.tabs button{
flex:1;
padding:12px;
border:none;
background:#eee;
cursor:pointer;
}

.tabs .active{
background:#4F46E5;
color:white;
}

.form{
display:none;
flex-direction:column;
}

.form.active{
display:flex;
}

input{
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
}

button.submit{
padding:12px;
border:none;
background:#4F46E5;
color:white;
border-radius:8px;
cursor:pointer;
}

button.submit:hover{
background:#6366F1;
}

.message{
font-size:14px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="left">
<h1>DormKart</h1>
<p>Smart Campus Marketplace</p>
</div>

<div class="right">

<div class="tabs">
<button id="loginTab" class="active">Login</button>
<button id="signupTab">Sign Up</button>
</div>

<!-- LOGIN -->

<div id="loginForm" class="form active">

<input type="email" id="loginEmail" placeholder="College Email">

<input type="password" id="loginPassword" placeholder="Password">

<button class="submit" onclick="login()">Login</button>

<div id="loginMsg" class="message"></div>

</div>


<!-- SIGNUP -->

<div id="signupForm" class="form">

<input type="email" id="signupEmail" placeholder="College Email">

<input type="password" id="signupPassword" placeholder="Password">

<button class="submit" onclick="signup()">Create Account</button>

<div id="signupMsg" class="message"></div>

</div>

</div>
</div>

<script>

// Supabase connection using config.js
const supabaseClient = supabase.createClient(
SUPABASE_CONFIG.url,
SUPABASE_CONFIG.key
)


// TAB SWITCH

const loginTab = document.getElementById("loginTab")
const signupTab = document.getElementById("signupTab")

const loginForm = document.getElementById("loginForm")
const signupForm = document.getElementById("signupForm")

loginTab.onclick = () => {

loginTab.classList.add("active")
signupTab.classList.remove("active")

loginForm.classList.add("active")
signupForm.classList.remove("active")

}

signupTab.onclick = () => {

signupTab.classList.add("active")
loginTab.classList.remove("active")

signupForm.classList.add("active")
loginForm.classList.remove("active")

}


// SIGNUP

async function signup(){

const email = document.getElementById("signupEmail").value
const password = document.getElementById("signupPassword").value

const { data, error } = await supabaseClient.auth.signUp({
email: email,
password: password
})

if(error){

document.getElementById("signupMsg").innerText = error.message

}

else{

document.getElementById("signupMsg").style.color="green"
document.getElementById("signupMsg").innerText="Signup successful! Redirecting..."

setTimeout(()=>{
window.location="dashboard.html"
},1200)

}

}


// LOGIN

async function login(){

const email = document.getElementById("loginEmail").value
const password = document.getElementById("loginPassword").value

const { data, error } = await supabaseClient.auth.signInWithPassword({
email: email,
password: password
})

if(error){

document.getElementById("loginMsg").innerText = error.message

}

else{

document.getElementById("loginMsg").style.color="green"
document.getElementById("loginMsg").innerText="Login successful! Redirecting..."

setTimeout(()=>{
window.location="dashboard.html"
},1000)

}

}

</script>

</body>
</html>
