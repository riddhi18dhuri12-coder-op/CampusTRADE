<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DormKart Profile</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Segoe UI;
background:#F0FDFA;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:12px;
width:380px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;
}

h2{
margin-bottom:20px;
}

img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
border:3px solid #14B8A6;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
background:#14B8A6;
color:white;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#0D9488;
}

.logout{
margin-top:10px;
background:#ef4444;
}

#msg{
margin-top:10px;
font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<h2>DormKart Profile</h2>

<img id="avatarPreview" src="https://via.placeholder.com/100">

<input type="file" id="avatarFile">

<input type="text" id="name" placeholder="Your Name">

<button onclick="saveProfile()">Save Profile</button>

<button class="logout" onclick="logout()">Logout</button>

<p id="msg"></p>

</div>

<script>

async function loadProfile(){

const { data } = await supabaseClient.auth.getSession()

if(!data.session){
window.location="login.html"
return
}

const user = data.session.user

const { data:profile } = await supabaseClient
.from("users")
.select("*")
.eq("id",user.id)
.single()

if(profile){

document.getElementById("name").value = profile.name || ""

if(profile.avatar_url){
document.getElementById("avatarPreview").src = profile.avatar_url
}

}

}

loadProfile()

document.getElementById("avatarFile").addEventListener("change",function(){

const file = this.files[0]

if(file){

document.getElementById("avatarPreview").src = URL.createObjectURL(file)

}

})

async function saveProfile(){

const msg=document.getElementById("msg")

const { data:sessionData } = await supabaseClient.auth.getSession()

const user = sessionData.session.user

const name = document.getElementById("name").value
const file = document.getElementById("avatarFile").files[0]

let avatarUrl = null

if(file){

msg.innerText="Uploading avatar..."

const filePath = "avatars/" + user.id + "-" + Date.now()

const { error } = await supabaseClient.storage
.from("dormkart-assets")
.upload(filePath,file)

if(error){

msg.innerText=error.message
return

}

avatarUrl = supabaseClient.storage
.from("dormkart-assets")
.getPublicUrl(filePath).data.publicUrl

}

msg.innerText="Saving profile..."

const { error } = await supabaseClient
.from("users")
.upsert({
id:user.id,
email:user.email,
name:name,
avatar_url:avatarUrl
})

if(error){

msg.innerText=error.message
return

}

msg.style.color="green"
msg.innerText="Profile saved successfully!"

}

async function logout(){

await supabaseClient.auth.signOut()

window.location="login-signup.html"

}

</script>

</body>

</html>
