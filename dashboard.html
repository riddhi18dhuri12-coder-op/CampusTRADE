<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DormKart Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
display:flex;
height:100vh;
background:#F9FAFB;
}

/* Sidebar */

.sidebar{
width:230px;
background:#4F46E5;
color:white;
padding:30px 20px;
display:flex;
flex-direction:column;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
color:white;
text-decoration:none;
margin-bottom:15px;
padding:10px;
border-radius:6px;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
}

/* Main */

.main{
flex:1;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{
font-size:28px;
}

.logout{
background:#EF4444;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

/* Cards */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card h3{
margin-bottom:10px;
}

.add-btn{
background:#4F46E5;
color:white;
border:none;
padding:12px 18px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>DormKart</h2>

<a href="#">Dashboard</a>
<a href="#">Marketplace</a>
<a href="#">My Listings</a>
<a href="#">Wishlist</a>
<a href="#">Messages</a>

</div>


<div class="main">

<div class="header">

<h1>Dashboard</h1>

<button class="logout" onclick="logout()">Logout</button>

</div>

<button class="add-btn">+ Add Item</button>

<br><br>

<div class="cards">

<div class="card">
<h3>My Listings</h3>
<p>View items you are selling.</p>
</div>

<div class="card">
<h3>Wishlist</h3>
<p>Items you saved.</p>
</div>

<div class="card">
<h3>Messages</h3>
<p>Chat with buyers and sellers.</p>
</div>

</div>

</div>


<script>

const supabaseClient = supabase.createClient(
SUPABASE_CONFIG.url,
SUPABASE_CONFIG.key
)

// Protect dashboard

async function checkUser(){

const { data } = await supabaseClient.auth.getSession()

if(!data.session){
window.location="index.html"
}

}

checkUser()


// Logout

async function logout(){

await supabaseClient.auth.signOut()

window.location="index.html"

}

</script>

</body>
</html>
