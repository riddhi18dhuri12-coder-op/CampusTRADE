<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DormKart Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
/* CSS Reset and Global Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    -webkit-tap-highlight-color: transparent;
}

body {
    background: #E6FFFA;
    color: #333;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* Header (App Bar) */
.header {
    background: #14B8A6;
    color: white;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.hamburger-menu, .notifications-container { cursor: pointer; }
.notifications-container { position: relative; }
.notification-badge {
    position: absolute;
    top: -5px;
    right: -5px;
    background: #EF4444;
    color: white;
    font-size: 10px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.logo-container {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: bold;
    font-size: 1.2rem;
}

.logo-icon { width: 24px; height: 24px; }

/* Hero Section */
.hero { text-align: center; padding: 40px 20px; }
.hero h1 { font-size: 2.2rem; color: #111; margin-bottom: 8px; }
.hero p { font-size: 1.2rem; color: #555; }

/* Search Bar */
.search-container {
    padding: 0 20px;
    margin-bottom: 24px;
    position: relative;
}
.search-input {
    width: 100%;
    padding: 14px 44px;
    border: 1px solid #ddd;
    border-radius: 30px;
    font-size: 1rem;
    background: white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
.search-icon, .qr-icon {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: #999;
}
.search-icon { left: 32px; }
.qr-icon { right: 32px; cursor: pointer; }

/* Filter Buttons */
.filter-buttons-container {
    display: flex;
    gap: 12px;
    padding: 0 20px;
    margin-bottom: 30px;
    overflow-x: auto;
}
.filter-buttons-container::-webkit-scrollbar { display: none; }

.filter-btn {
    padding: 10px 20px;
    border-radius: 30px;
    border: 1px solid #ddd;
    background: white;
    color: #555;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
}
.filter-btn.active {
    background: #14B8A6;
    color: white;
    border-color: #14B8A6;
    box-shadow: 0 4px 10px rgba(20, 184, 166, 0.3);
}

/* Sections Global Styling */
.section { padding: 0 20px; margin-bottom: 30px; }
.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}
.section-header .section-title-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #14B8A6;
}
.section-header h2 { font-size: 1.4rem; color: #222; }

/* Product Grid */
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
}

.product-card {
    background: white;
    padding: 12px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    position: relative;
    cursor: pointer;
    transition: transform 0.2s;
    display: flex;
    flex-direction: column;
}
.product-card:hover { transform: translateY(-5px); }

.discount-badge {
    position: absolute;
    top: -8px;
    left: 8px;
    background: #EF4444;
    color: white;
    padding: 4px 8px;
    font-size: 10px;
    font-weight: bold;
    border-radius: 12px;
    z-index: 10;
}

.product-image-container {
    width: 100%;
    height: 120px;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 10px;
    background: #F1F1F1;
    display: flex;
    align-items: center;
    justify-content: center;
}
.product-image-container img { width: 100%; height: 100%; object-fit: cover; }

.product-title {
    font-size: 0.95rem;
    color: #333;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.price-container { display: flex; gap: 8px; align-items: center; margin-top: auto; }
.current-price { font-weight: bold; font-size: 1.1rem; color: #111; }
.original-price { text-decoration: line-through; color: #999; font-size: 0.8rem; }

/* Curated Bundles */
.bundle-banner {
    background: linear-gradient(to right, #2D3748, #CB7C6C);
    color: white;
    padding: 24px;
    border-radius: 12px;
    position: relative;
}
.seniors-tag {
    background: rgba(255, 255, 255, 0.15);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
    margin-bottom: 12px;
    display: inline-block;
}

/* Bottom Navigation */
.bottom-nav {
    background: white;
    padding: 10px 0;
    display: flex;
    justify-content: space-around;
    position: fixed;
    bottom: 0;
    width: 100%;
    box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
    z-index: 100;
}
.nav-item {
    text-align: center;
    color: #888;
    cursor: pointer;
    transition: color 0.2s;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.nav-item.active { color: #14B8A6; }
.nav-item i { font-size: 1.5rem; margin-bottom: 4px; }
.nav-item p { font-size: 0.8rem; }

.main-content { padding-bottom: 80px; }
</style>
</head>

<body>

    <div class="header">
        <div class="hamburger-menu"><i class="material-icons">menu</i></div>
        <div class="logo-container">
            <svg class="logo-icon" viewBox="0 0 24 24">
                <path fill="currentColor" d="M17,11V15H7V11H17M19,9H5V17H19V9Z" />
                <path fill="white" d="M19,9H5V17H19V9Z" />
                <path fill="#14B8A6" d="M17,11H7V15H17V11Z"/>
            </svg>
            <span>DormKart</span>
        </div>
        <div class="notifications-container">
            <i class="material-icons">notifications_active</i>
            <span class="notification-badge">1</span>
        </div>
    </div>

    <div class="main-content">
        <div class="hero">
            <h1>Buy, Sell, Rent</h1>
            <p>within Your Campus</p>
        </div>

        <div class="search-container">
            <i class="material-icons search-icon">search</i>
            <input type="text" class="search-input" placeholder="Search for books, electronics...">
            <i class="material-icons qr-icon">qr_code_scanner</i>
        </div>

        <div class="filter-buttons-container">
            <button class="filter-btn active" onclick="filterListings('All', this)">All</button>
            <button class="filter-btn" onclick="filterListings('Buy/Sell', this)">Buy/Sell</button>
            <button class="filter-btn" onclick="filterListings('Rent', this)">Rent</button>
            <button class="filter-btn" onclick="filterListings('Swap', this)">Swap</button>
        </div>

        <div class="section flash-deals-section">
            <div class="section-header">
                <div class="section-title-wrapper">
                    <i class="material-icons">flash_on</i>
                    <h2>Marketplace</h2>
                </div>
            </div>

            <div class="product-grid" id="products-container">
                <p style="grid-column: 1 / -1; text-align: center; color: #999;">Loading marketplace...</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="window.location.href='dashboard.html'">
            <i class="material-icons">home</i><p>Home</p>
        </div>
        <div class="nav-item" onclick="window.location.href='add-product.html'">
            <i class="material-icons">add_box</i><p>List Item</p>
        </div>
        <div class="nav-item" onclick="window.location.href='swap.html'">
            <i class="material-icons">swap_horiz</i><p>Swap</p>
        </div>
        <div class="nav-item" onclick="window.location.href='chats.html'">
            <i class="material-icons">chat</i><p>Chat</p>
        </div>
        <div class="nav-item" onclick="window.location.href='profile.html'">
            <i class="material-icons">person</i><p>Profile</p>
        </div>
    </div>

<script>
const supabaseClient = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key);

async function checkUser(){
    const { data } = await supabaseClient.auth.getSession();
    if(!data.session) window.location="index.html";
}
checkUser();

let currentCategory = 'All';

function filterListings(category, btnElement) {
    const buttons = document.querySelectorAll('.filter-btn');
    buttons.forEach(btn => btn.classList.remove('active'));
    btnElement.classList.add('active');
    currentCategory = category;
    fetchListings();
}

async function fetchListings() {
    const productsContainer = document.getElementById('products-container');
    productsContainer.innerHTML = `<p style="grid-column: 1 / -1; text-align: center; color: #999;">Loading items...</p>`;
    
    try {
        let query = supabaseClient.from('listings').select('*').eq('status', 'Available').order('created_at', { ascending: false });
        if (currentCategory !== 'All') query = query.eq('category', currentCategory);

        const { data: listings, error } = await query;
        if (error) throw error;

        productsContainer.innerHTML = '';

        if (!listings || listings.length === 0) {
            productsContainer.innerHTML = `<p style="grid-column: 1 / -1; text-align: center; color: #64748B; padding: 20px;">No ${currentCategory !== 'All' ? currentCategory : ''} items available right now.</p>`;
            return;
        }

        listings.forEach(item => {
            let discountBadge = '';
            if (item.original_price && item.original_price > item.price) {
                const discount = Math.round(((item.original_price - item.price) / item.original_price) * 100);
                discountBadge = `<span class="discount-badge">-${discount}% OFF</span>`;
            }

            const imageHtml = item.image_url ? `<img src="${item.image_url}" alt="${item.title}">` : `<i class="material-icons" style="font-size: 40px; color: #ccc;">image_not_supported</i>`;
            const originalPriceHtml = (item.original_price && item.original_price > item.price) ? `<span class="original-price"><s>₹${item.original_price}</s></span>` : ``;

            const cardHtml = `
                <div class="product-card" onclick="window.location.href='product.html?id=${item.id}'">
                    ${discountBadge}
                    <div class="product-image-container">${imageHtml}</div>
                    <h3 class="product-title" title="${item.title}">${item.title}</h3>
                    <div class="price-container">
                        <span class="current-price">₹${item.price}</span>
                        ${originalPriceHtml}
                    </div>
                </div>
            `;
            productsContainer.innerHTML += cardHtml;
        });

    } catch (error) {
        console.error('Error fetching listings:', error);
        productsContainer.innerHTML = `<p style="grid-column: 1 / -1; text-align: center; color: #EF4444;">Failed to load items.</p>`;
    }
}
fetchListings();
</script>
</body>
</html>
