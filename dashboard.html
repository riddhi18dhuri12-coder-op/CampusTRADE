<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DormKart - Browse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Mobile Navigation -->
    <nav class="mobile-nav">
        <div class="nav-header">
            <div class="logo-small">
                <span>🛒</span>
                <h2>DormKart</h2>
            </div>
            <div class="nav-actions">
                <button class="icon-btn" id="voice-search-btn" title="Voice Search">🎤</button>
                <button class="icon-btn" id="notifications-btn">🔔</button>
                <button class="icon-btn" id="menu-btn">☰</button>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="search-container">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="Search for items, books, electronics...">
                <button class="filter-btn" id="filter-toggle">⚡</button>
            </div>
        </div>

        <!-- Category Pills -->
        <div class="categories-scroll">
            <button class="category-pill active" data-category="all">All</button>
            <button class="category-pill" data-category="Electronics">📱 Electronics</button>
            <button class="category-pill" data-category="Books">📚 Books</button>
            <button class="category-pill" data-category="Stationery">✏️ Stationery</button>
            <button class="category-pill" data-category="Gaming">🎮 Gaming</button>
            <button class="category-pill" data-category="Hostel Essentials">🏠 Hostel</button>
            <button class="category-pill" data-category="Fashion">👕 Fashion</button>
            <button class="category-pill" data-category="Collection Items">🎯 Collection</button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="dashboard-main">
        <!-- Quick Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-value" id="online-users">142</span>
                <span class="stat-label">Online</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="active-listings">1,234</span>
                <span class="stat-label">Items</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="daily-deals">23</span>
                <span class="stat-label">Deals</span>
            </div>
        </div>

        <!-- Flash Deals Section -->
        <section class="section-container">
            <div class="section-header">
                <h3>⚡ Flash Deals</h3>
                <a href="#" class="see-all">See All →</a>
            </div>
            <div class="flash-deals-scroll" id="flash-deals-container">
                <!-- Dynamically populated -->
            </div>
        </section>

        <!-- Trending Items -->
        <section class="section-container">
            <div class="section-header">
                <h3>🔥 Trending Near You</h3>
                <span class="trend-badge">Hot</span>
            </div>
            <div class="products-grid" id="trending-products">
                <!-- Dynamically populated -->
            </div>
        </section>

        <!-- Main Product Grid -->
        <section class="section-container">
            <div class="section-header">
                <h3>📦 Recent Listings</h3>
                <select id="sort-select" class="sort-select">
                    <option value="newest">Newest</option>
                    <option value="price_low">Price: Low to High</option>
                    <option value="price_high">Price: High to Low</option>
                    <option value="popular">Most Popular</option>
                </select>
            </div>
            <div class="products-grid" id="products-container">
                <!-- Dynamically populated -->
            </div>
        </section>

        <!-- Loading State -->
        <div id="loading-state" class="loading-state">
            <div class="loading-spinner"></div>
            <p>Finding items near you...</p>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
        </a>
        <a href="#" class="nav-item" id="reels-nav">
            <span class="nav-icon">📱</span>
            <span class="nav-label">Reels</span>
        </a>
        <button class="nav-item add-product-btn" id="add-product-fab">
            <span class="fab-icon">+</span>
        </button>
        <a href="chats.html" class="nav-item">
            <span class="nav-icon">💬</span>
            <span class="nav-label">Chats</span>
            <span class="badge" id="unread-badge">3</span>
        </a>
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Profile</span>
        </a>
    </nav>

    <!-- Product Modal (Hidden by default) -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="modal-close">&times;</button>
                <div class="modal-actions">
                    <button class="icon-btn" id="modal-share">🔗</button>
                    <button class="icon-btn" id="modal-report">🚩</button>
                </div>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Product details will be injected here -->
            </div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div id="add-product-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Sell an Item</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="add-product-form">
                    <div class="form-group">
                        <label>Photos</label>
                        <div class="photo-upload-container">
                            <div class="photo-preview" id="photo-preview">
                                <button type="button" class="add-photo-btn">+ Add Photos</button>
                            </div>
                            <input type="file" id="product-photos" multiple accept="image/*" style="display: none;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="product-title" placeholder="What are you selling?" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Price (₹)</label>
                            <input type="number" id="product-price" placeholder="0" required>
                            <small id="price-suggestion" class="suggestion-text"></small>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="product-category" required>
                                <option value="">Select</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Books">Books</option>
                                <option value="Stationery">Stationery</option>
                                <option value="Gaming">Gaming</option>
                                <option value="Hostel Essentials">Hostel Essentials</option>
                                <option value="Fashion">Fashion</option>
                                <option value="Collection Items">Collection Items</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Condition</label>
                            <select id="product-condition" required>
                                <option value="">Select</option>
                                <option value="Like New">Like New</option>
                                <option value="Excellent">Excellent</option>
                                <option value="Good">Good</option>
                                <option value="Fair">Fair</option>
                                <option value="Used">Used</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Meetup Location</label>
                            <select id="meetup-location">
                                <option value="">Select</option>
                                <option value="Library">Library</option>
                                <option value="Student Union">Student Union</option>
                                <option value="Cafeteria">Cafeteria</option>
                                <option value="Dorm Lobby">Dorm Lobby</option>
                                <option value="Admin Block">Admin Block</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="product-description" rows="4" placeholder="Describe your item..."></textarea>
                    </div>

                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="swap-enabled">
                            <span>Open to trade/swap</span>
                        </label>
                    </div>

                    <div class="form-group" id="swap-item-group" style="display: none;">
                        <label>Item wanted in exchange (optional)</label>
                        <input type="text" id="swap-item" placeholder="What would you trade for?">
                    </div>

                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="urgent-sale">
                            <span>🏃 Urgent Sale (Adds badge to listing)</span>
                        </label>
                    </div>

                    <div class="safety-notice">
                        <span>🛡️</span>
                        <p>Safety Tip: Meet in public campus locations and verify student ID before payment.</p>
                    </div>

                    <button type="submit" class="btn-primary btn-block">List Item</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Reels Modal -->
    <div id="reels-modal" class="modal fullscreen-modal">
        <div class="reels-container">
            <div class="reels-header">
                <h3>📱 Product Reels</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="reels-content" id="reels-content">
                <!-- Vertical swipeable product cards -->
            </div>
        </div>
    </div>

    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
