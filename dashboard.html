<!DOCTYPE html>
<html>
<head>

<title>DormKart Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#F9FAFB;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.add-btn{
background:#4F46E5;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

/* FILTERS */

.filters{
display:flex;
gap:15px;
padding:20px 40px;
}

.filters input,select{
padding:10px;
border:1px solid #ddd;
border-radius:6px;
}

/* GRID */

.container{
padding:0 40px 40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
color:#4F46E5;
font-weight:bold;
}

.card button{
margin-top:8px;
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.save{
background:#EF4444;
color:white;
}

.view{
background:#4F46E5;
color:white;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:25px;
border-radius:10px;
width:320px;
}

.modal-box input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:6px;
}

</style>

</head>

<body>


<div class="header">

<h2>DormKart Marketplace</h2>

<button class="add-btn" onclick="openModal()">+ Add Item</button>

</div>


<div class="filters">

<input id="search" placeholder="Search items..." oninput="loadItems()">

<select id="category" onchange="loadItems()">
<option value="">All Categories</option>
<option>Books</option>
<option>Electronics</option>
<option>Cycles</option>
<option>Accessories</option>
</select>

</div>


<div class="container">

<div id="items" class="grid"></div>

</div>


<!-- ADD ITEM MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<h3>Add Item</h3>

<input id="title" placeholder="Item Title">

<input id="price" placeholder="Price">

<select id="cat">
<option>Books</option>
<option>Electronics</option>
<option>Cycles</option>
<option>Accessories</option>
</select>

<input type="file" id="imageFile">

<button onclick="addItem()">Add Item</button>

</div>

</div>


<script>

const supabaseClient = supabase.createClient(
SUPABASE_CONFIG.url,
SUPABASE_CONFIG.key
)


// Protect page

async function checkUser(){

const { data } = await supabaseClient.auth.getSession()

if(!data.session){
window.location="index.html"
}

}

checkUser()


// LOAD ITEMS

async function loadItems(){

const search = document.getElementById("search").value.toLowerCase()
const category = document.getElementById("category").value

const { data } = await supabaseClient
.from("items")
.select("*")

const container = document.getElementById("items")

container.innerHTML=""

data
.filter(item =>
item.title.toLowerCase().includes(search) &&
(category=="" || item.category==category)
)
.forEach(item => {

container.innerHTML += `
<div class="card">

<img src="${item.image}">

<div class="card-body">

<h3>${item.title}</h3>

<p class="price">₹${item.price}</p>

<p>${item.category}</p>

<button class="save" onclick="saveItem(${item.id})">
❤️ Save
</button>

<button class="view" onclick="viewItem(${item.id})">
View
</button>

</div>

</div>
`

})

}

loadItems()



// OPEN MODAL

function openModal(){
document.getElementById("modal").style.display="flex"
}



// ADD ITEM WITH IMAGE UPLOAD

async function addItem(){

const title = document.getElementById("title").value
const price = document.getElementById("price").value
const category = document.getElementById("cat").value

const file = document.getElementById("imageFile").files[0]

const { data:userData } = await supabaseClient.auth.getUser()

const fileName = Date.now() + "-" + file.name


await supabaseClient.storage
.from("item-images")
.upload(fileName,file)


const { data:imageUrl } = supabaseClient.storage
.from("item-images")
.getPublicUrl(fileName)


await supabaseClient
.from("items")
.insert([{
title,
price,
category,
image:imageUrl.publicUrl,
seller_id:userData.user.id
}])


document.getElementById("modal").style.display="none"

loadItems()

}



// SAVE TO WISHLIST

async function saveItem(itemId){

const { data:userData } = await supabaseClient.auth.getUser()

await supabaseClient
.from("wishlist")
.insert([{
user_id:userData.user.id,
item_id:itemId
}])

alert("Saved to wishlist")

}



// VIEW ITEM PAGE

function viewItem(id){

window.location="item.html?id="+id

}

</script>

</body>
</html>
