<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>DormKart Marketplace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body { background:#E6FFFA; padding-bottom: 80px; }
        .header { background:#14B8A6; color:white; height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight:bold; font-size:20px; }
        .hero { text-align:center; padding:20px 10px; }
        .search { padding:0 20px; margin-bottom:15px; }
        .search input { width:100%; padding:12px; border-radius:25px; border:1px solid #ccc; outline: none; }
        .filters { display:flex; gap:10px; overflow:auto; padding:10px 20px; }
        .filters button { padding:8px 15px; border:none; border-radius:20px; background:white; cursor:pointer; white-space: nowrap; }
        .filters .active { background:#14B8A6; color:white; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:15px; padding:15px; }
        .card { background:white; border-radius:12px; overflow:hidden; shadow:0 4px 10px rgba(0,0,0,0.1); cursor:pointer; display:flex; flex-direction:column; }
        .image { height:130px; background:#f0f0f0; display:flex; align-items:center; justify-content:center; }
        .image img { width:100%; height:100%; object-fit:cover; }
        .content { padding:10px; }
        .title { font-size:14px; font-weight: 600; margin-bottom:4px; }
        .price { color: #14B8A6; font-weight:bold; }
        .seller { display:flex; align-items:center; gap:5px; margin-top:8px; font-size:11px; color:#666; }
        .seller img { width:18px; height:18px; border-radius:50%; }
        .bottom { position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; padding:10px; border-top:1px solid #eee; }
        .bottom i { color:#888; cursor:pointer; }
        .bottom .active i { color:#14B8A6; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">DormKart</div>
    <div class="notification"><i class="material-icons">notifications</i></div>
</div>

<div class="hero">
    <h1>Marketplace</h1>
</div>

<div class="search">
    <input id="searchInput" placeholder="Search products...">
</div>

<div class="filters">
    <button class="active" onclick="setCategory('All',this)">All</button>
    <button onclick="setCategory('Books',this)">Books</button>
    <button onclick="setCategory('Electronics',this)">Electronics</button>
    <button onclick="setCategory('Furniture',this)">Furniture</button>
</div>

<div id="productGrid" class="grid">
    <p style="text-align:center; grid-column: 1/-1;">Loading items...</p>
</div>

<div class="bottom">
    <div class="active" onclick="location.href='dashboard.html'"><i class="material-icons">home</i></div>
    <div onclick="location.href='add-product.html'"><i class="material-icons">add_box</i></div>
    <div onclick="location.href='chats.html'"><i class="material-icons">chat</i></div>
    <div onclick="location.href='profile.html'"><i class="material-icons">person</i></div>
</div>

<script>
    const supabaseClient = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key);
    let currentUser = null;
    let currentCategory = "All";

    async function init() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { location.href = "index.html"; return; }
        currentUser = user;
        fetchProducts();
    }

    async function fetchProducts() {
        const grid = document.getElementById("productGrid");
        grid.innerHTML = "Fetching...";

        try {
            // UPDATED QUERY: Looking for 'available'
            let query = supabaseClient
                .from("products")
                .select(`*, users(name, avatar_url)`);

            // Filter by category
            if (currentCategory !== "All") {
                query = query.eq("category", currentCategory);
            }

            // Filter by status (available)
            // If some products have no status, we use .or to show 'available' OR 'null'
            query = query.or('status.eq.available,status.is.null');

            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) throw error;

            if (!data || data.length === 0) {
                grid.innerHTML = `<p style="grid-column:1/-1; text-align:center;">No products found with status 'available'.</p>`;
                return;
            }

            grid.innerHTML = "";
            data.forEach(p => {
                const sellerName = p.users?.name || "Student";
                const avatar = p.users?.avatar_url || `https://ui-avatars.com/api/?name=${sellerName}`;
                
                const card = `
                    <div class="card" onclick="location.href='product.html?id=${p.id}'">
                        <div class="image">
                            ${p.image_url ? `<img src="${p.image_url}">` : `<i class="material-icons">image</i>`}
                        </div>
                        <div class="content">
                            <div class="title">${p.title || 'Untitled'}</div>
                            <div class="price">₹${p.price || '0'}</div>
                            <div class="seller">
                                <img src="${avatar}">
                                <span>${sellerName}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML("beforeend", card);
            });

        } catch (err) {
            console.error(err);
            grid.innerHTML = `<p style="color:red; text-align:center; grid-column:1/-1;">Error: ${err.message}</p>`;
        }
    }

    function setCategory(cat, btn) {
        document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentCategory = cat;
        fetchProducts();
    }

    init();
</script>
</body>
</html>
