<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DormKart Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
display:flex;
height:100vh;
background:#F0FDFA;
}

/* Sidebar */

.sidebar{
width:240px;
background:#14B8A6;
color:white;
padding:30px 20px;
display:flex;
flex-direction:column;
box-shadow:4px 0 20px rgba(0,0,0,0.05);
}

.sidebar h2{
margin-bottom:35px;
font-weight:600;
letter-spacing:1px;
}

.sidebar a{
color:white;
text-decoration:none;
margin-bottom:12px;
padding:12px 14px;
border-radius:8px;
display:flex;
align-items:center;
gap:10px;
transition:0.25s;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
transform:translateX(4px);
}

/* Main Section */

.main{
flex:1;
padding:40px;
}

/* Header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{
font-size:28px;
font-weight:600;
color:#0F172A;
}

/* Logout */

.logout{
background:#EF4444;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-weight:500;
transition:0.2s;
}

.logout:hover{
opacity:0.9;
}

/* Add Item Button */

.add-btn{
background:#14B8A6;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-weight:500;
box-shadow:0 5px 15px rgba(20,184,166,0.25);
transition:0.2s;
}

.add-btn:hover{
background:#0D9488;
}

/* Cards */

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
}

.card{
background:white;
padding:22px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

.card h3{
margin-bottom:10px;
font-size:18px;
color:#0F172A;
}

.card p{
color:#64748B;
font-size:14px;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>DormKart</h2>

<a href="dashboard.html">Dashboard</a>
<a href="marketplace.html">Marketplace</a>
<a href="#">My Listings</a>
<a href="#">Wishlist</a>
<a href="chats.html">Messages</a>

</div>


<div class="main">

<div class="header">

<h1>Dashboard</h1>

<button class="logout" onclick="logout()">Logout</button>

</div>

<button class="add-btn">+ Add Item</button>

<br><br>

<div class="cards">

<div class="card">
<h3>My Listings</h3>
<p>View items you are selling.</p>
</div>

<div class="card">
<h3>Wishlist</h3>
<p>Items you saved.</p>
</div>

<div class="card">
<h3>Messages</h3>
<p>Chat with buyers and sellers.</p>
</div>

</div>

</div>


<script>

const supabaseClient = supabase.createClient(
SUPABASE_CONFIG.url,
SUPABASE_CONFIG.key
)

// Protect dashboard

async function checkUser(){

const { data } = await supabaseClient.auth.getSession()

if(!data.session){
window.location="index.html"
}

}

checkUser()


// Logout

async function logout(){

await supabaseClient.auth.signOut()

window.location="index.html"

}

</script>

</body>
</html>
