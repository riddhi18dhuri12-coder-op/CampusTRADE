<!-- PROFILE PAGE FINAL VERSION -->
<!-- Only JS section shown here to keep message readable -->
<!-- HTML & CSS remain mostly same -->

<script>

const supabaseClient =
supabase.createClient(
SUPABASE_CONFIG.url,
SUPABASE_CONFIG.key
)

let currentUser
let allProducts=[]

async function initProfile(){

const {data:{session}} =
await supabaseClient.auth.getSession()

if(!session){
window.location="login.html"
return
}

currentUser=session.user

await loadProfile()
await loadInventory()
await loadReviews()

checkTheme()

}

initProfile()


async function loadProfile(){

const {data,error} =
await supabaseClient
.from("profiles")
.select("*")
.eq("id",currentUser.id)
.single()

if(error){
console.error(error)
return
}

document.getElementById("userName").innerText =
data.full_name || "Dorm Member"

document.getElementById("userCollege").innerText =
data.college || "Add College"

document.getElementById("userBio").innerText =
data.bio || "Tell buyers about yourself"

if(data.avatar_url)
document.getElementById("userAvatar").src =
data.avatar_url

updateProfileCompletion(data)

}


function updateProfileCompletion(profile){

let score=40

if(profile.full_name) score+=20
if(profile.bio) score+=20
if(profile.college) score+=20

document.getElementById("progressFill").style.width=
score+"%"

document.getElementById("progressPercent").innerText=
score+"%"

}


async function loadInventory(){

const {data,error} =
await supabaseClient
.from("products")
.select("*")
.eq("seller_id",currentUser.id)
.order("created_at",{ascending:false})

if(error){
console.error(error)
return
}

allProducts=data

renderProducts(data)
updateStats(data)

}


function renderProducts(items){

const container=
document.getElementById("listingsWrapper")

container.innerHTML=""

if(items.length===0){
renderEmpty()
return
}

items.forEach(item=>{

const isSold =
item.status === "sold"

container.innerHTML+=`

<div class="product-card">

<img src="${item.image_url}" class="product-img">

<div class="product-content">

<div class="p-price">₹${item.price}</div>

<div class="p-title">${item.title}</div>

<div class="p-meta">${item.category}</div>

<div class="card-actions">

<button class="btn-icon"
onclick="toggleSold('${item.id}','${item.status}')">

${isSold?"Relist":"Mark Sold"}

</button>

<button class="btn-icon"
onclick="editListing('${item.id}')">

Edit

</button>

<button class="btn-icon btn-delete"
onclick="deleteItem('${item.id}')">

Delete

</button>

</div>

</div>

</div>

`

})

}


function updateStats(items){

const active=
items.filter(i=>i.status!=="sold").length

const sold=
items.filter(i=>i.status==="sold").length

const revenue=
items
.filter(i=>i.status==="sold")
.reduce((acc,c)=>acc+Number(c.price),0)

document.getElementById("statActive").innerText=active
document.getElementById("statSold").innerText=sold
document.getElementById("statEarnings").innerText="₹"+revenue

}


async function toggleSold(id,status){

const newStatus=
status==="sold" ? "available" : "sold"

const {error}=
await supabaseClient
.from("products")
.update({status:newStatus})
.eq("id",id)

if(!error){

toast("Listing updated")

loadInventory()

}

}


async function deleteItem(id){

if(!confirm("Delete listing?")) return

const {error}=
await supabaseClient
.from("products")
.delete()
.eq("id",id)

if(!error){

toast("Item deleted")

loadInventory()

}

}


function editListing(id){

window.location=
"add-product.html?id="+id

}


function filterInventory(){

const q=
document.getElementById("inventorySearch")
.value
.toLowerCase()

const filtered=
allProducts.filter(p=>
p.title.toLowerCase().includes(q)
)

renderProducts(filtered)

}


async function uploadAvatar(input){

const file=input.files[0]

const fileName=
currentUser.id+"-"+Date.now()

const {error}=
await supabaseClient.storage
.from("avatars")
.upload(fileName,file)

if(error){
alert(error.message)
return
}

const {data}=
supabaseClient.storage
.from("avatars")
.getPublicUrl(fileName)

await supabaseClient
.from("profiles")
.update({avatar_url:data.publicUrl})
.eq("id",currentUser.id)

document.getElementById("userAvatar").src=
data.publicUrl

toast("Profile photo updated")

}


async function logout(){

await supabaseClient.auth.signOut()

window.location="index.html"

}


function toast(msg){

const t=document.createElement("div")

t.innerText=msg

t.style.position="fixed"
t.style.bottom="100px"
t.style.left="50%"
t.style.transform="translateX(-50%)"
t.style.background="#14B8A6"
t.style.color="white"
t.style.padding="10px 20px"
t.style.borderRadius="20px"
t.style.zIndex="9999"

document.body.appendChild(t)

setTimeout(()=>t.remove(),2500)

}

</script>
