<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Profile | DormKart</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #14B8A6;
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --text: #1E293B;
            --text-light: #64748B;
            --border: #E2E8F0;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        body.dark-mode {
            --bg: #0F172A;
            --card: #1E293B;
            --text: #F1F5F9;
            --text-light: #94A3B8;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; transition: 0.3s; }

        /* Navigation Bar */
        .app-bar {
            background: var(--card); padding: 15px 20px; display: flex;
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border);
        }

        /* Profile Header */
        .profile-header {
            background: var(--card); padding: 30px 20px 50px;
            border-radius: 0 0 30px 30px; box-shadow: var(--shadow);
        }
        .profile-top { display: flex; align-items: center; gap: 20px; }
        .avatar-box { position: relative; width: 80px; height: 80px; }
        .avatar-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }
        .edit-pic { position: absolute; bottom: 0; right: 0; background: var(--primary); color: white; border-radius: 50%; padding: 4px; cursor: pointer; border: 2px solid var(--card); }

        .rating-badge { background: #FFFBEB; color: #B45309; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; margin-top: 5px; }

        /* Completion Widget */
        .completion-container { margin-top: 20px; background: var(--bg); padding: 12px; border-radius: 12px; }
        .progress-bar { height: 6px; background: var(--border); border-radius: 10px; margin-top: 8px; overflow: hidden; }
        #progressFill { height: 100%; background: var(--primary); transition: 0.5s; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 20px; margin-top: -30px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 16px; text-align: center; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .stat-card b { display: block; font-size: 18px; color: var(--primary); }
        .stat-card span { font-size: 10px; color: var(--text-light); text-transform: uppercase; font-weight: 700; }

        /* Search Bar */
        .search-area { padding: 0 20px; margin-bottom: 20px; }
        .search-input { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); outline: none; }

        /* Product Cards */
        .listings-container { padding: 0 20px; display: grid; gap: 15px; }
        .product-card { background: var(--card); border-radius: 16px; padding: 12px; display: flex; gap: 15px; border: 1px solid var(--border); box-shadow: var(--shadow); position: relative;}
        .product-img { width: 90px; height: 90px; border-radius: 12px; object-fit: cover; }
        .p-price { color: var(--primary); font-weight: 700; font-size: 16px; }
        .card-actions { display: flex; gap: 8px; margin-top: 10px; }
        .btn-icon { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text); }
        .btn-delete { color: #EF4444; border-color: #FEE2E2; }
        .sold-label { position: absolute; top: 10px; right: 10px; background: #EF4444; color: white; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 800; }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--text-light); }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }

        .btn-main { background: var(--primary); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); }
        .nav-item { text-decoration: none; color: var(--text-light); text-align: center; font-size: 10px; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { display: block; font-size: 24px; }
    </style>
</head>
<body>

    <div class="app-bar">
        <i class="material-icons" onclick="toggleDarkMode()">dark_mode</i>
        <h2 style="font-size: 16px;">My Profile</h2>
        <i class="material-icons" onclick="logout()" style="color: #EF4444;">logout</i>
    </div>

    <div class="profile-header">
        <div class="profile-top">
            <div class="avatar-box">
                <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=14B8A6&color=fff">
                <label for="avatarInput" class="edit-pic"><i class="material-icons" style="font-size: 16px;">camera_alt</i></label>
                <input type="file" id="avatarInput" hidden onchange="uploadAvatar(this)">
            </div>
            <div class="user-meta">
                <h2 id="userName">Loading...</h2>
                <p id="userCollege" style="font-size: 13px; color: var(--text-light);">University Name</p>
                <div class="rating-badge">
                    <i class="material-icons" style="font-size: 14px;">star</i>
                    <span id="avgRating">0.0</span> <span style="font-weight: 400; opacity: 0.6;">(<span id="reviewCount">0</span>)</span>
                </div>
            </div>
        </div>

        <p id="userBio" style="font-size: 13px; color: var(--text-light); margin-top: 15px;">Add a bio to build trust!</p>
        
        <div class="completion-container">
            <div style="display: flex; justify-content: space-between; font-size: 11px; font-weight: 700;">
                <span>Profile Completion</span>
                <span id="progressPercent">40%</span>
            </div>
            <div class="progress-bar"><div id="progressFill" style="width: 40%;"></div></div>
        </div>

        <button class="btn-main" style="margin-top: 15px; height: 45px;" onclick="openModal()">Edit Profile</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><b id="statActive">0</b><span>Active</span></div>
        <div class="stat-card"><b id="statSold">0</b><span>Sold</span></div>
        <div class="stat-card"><b id="statEarnings">₹0</b><span>Earnings</span></div>
    </div>

    <div class="search-area">
        <input type="text" class="search-input" id="inventorySearch" placeholder="Search my items..." onkeyup="filterInventory()">
    </div>

    <div class="listings-container" id="listingsWrapper">
        </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">Edit Profile</h3>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="editName">
            </div>
            <div class="input-group">
                <label>College</label>
                <input type="text" id="editCollege">
            </div>
            <div class="input-group">
                <label>Bio</label>
                <textarea id="editBio" rows="3"></textarea>
            </div>
            <button class="btn-main" onclick="saveProfile()">Save Changes</button>
            <button style="background:transparent; border:none; width:100%; margin-top:12px; color:var(--text-light);" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="material-icons">explore</i><span>Home</span></a>
        <a href="add-product.html" class="nav-item"><i class="material-icons">add_box</i><span>Sell</span></a>
        <a href="chats.html" class="nav-item"><i class="material-icons">chat</i><span>Chats</span></a>
        <a href="#" class="nav-item active"><i class="material-icons">person</i><span>Profile</span></a>
    </nav>

    <script>
        const supabaseClient = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key);
        let currentUser, allProducts = [];

        async function initProfile() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return window.location.href = "login.html";
            currentUser = session.user;
            
            loadProfile();
            loadInventory();
            loadReviews();
            checkTheme();
        }

        async function loadProfile() {
            const { data } = await supabaseClient.from("profiles").select("*").eq("id", currentUser.id).single();
            if (data) {
                document.getElementById("userName").innerText = data.full_name || "Dorm Member";
                document.getElementById("userCollege").innerText = data.college || "Add College";
                document.getElementById("userBio").innerText = data.bio || "Tell buyers about yourself";
                if (data.avatar_url) document.getElementById("userAvatar").src = data.avatar_url;
                
                // Set modal values
                document.getElementById("editName").value = data.full_name || "";
                document.getElementById("editCollege").value = data.college || "";
                document.getElementById("editBio").value = data.bio || "";
                
                updateProfileCompletion(data);
            }
        }

        async function loadReviews() {
            const { data } = await supabaseClient.from("reviews").select("rating").eq("seller_id", currentUser.id);
            if (data && data.length > 0) {
                const avg = data.reduce((acc, c) => acc + c.rating, 0) / data.length;
                document.getElementById("avgRating").innerText = avg.toFixed(1);
                document.getElementById("reviewCount").innerText = data.length;
            }
        }

        async function loadInventory() {
            const { data } = await supabaseClient.from("products").select("*").eq("seller_id", currentUser.id).order("created_at", { ascending: false });
            allProducts = data || [];
            renderProducts(allProducts);
            updateStats(allProducts);
        }

        function renderProducts(items) {
            const container = document.getElementById("listingsWrapper");
            container.innerHTML = "";
            items.forEach(item => {
                const isSold = item.status === "sold";
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${item.image_url}" class="product-img">
                        <div class="product-content">
                            <div class="p-price">₹${item.price}</div>
                            <div style="font-weight:600; font-size:14px; margin:2px 0;">${item.title}</div>
                            <div class="card-actions">
                                <button class="btn-icon" onclick="toggleSold('${item.id}','${item.status}')">${isSold ? 'Relist' : 'Mark Sold'}</button>
                                <button class="btn-icon" onclick="editListing('${item.id}')">Edit</button>
                                <button class="btn-icon btn-delete" onclick="deleteItem('${item.id}')">Delete</button>
                            </div>
                        </div>
                        ${isSold ? '<div class="sold-label">SOLD</div>' : ''}
                    </div>`;
            });
        }

        function updateStats(items) {
            const active = items.filter(i => i.status !== "sold").length;
            const sold = items.filter(i => i.status === "sold").length;
            const revenue = items.filter(i => i.status === "sold").reduce((acc, c) => acc + Number(c.price), 0);
            document.getElementById("statActive").innerText = active;
            document.getElementById("statSold").innerText = sold;
            document.getElementById("statEarnings").innerText = "₹" + revenue;
        }

        async function saveProfile() {
            const updates = {
                full_name: document.getElementById("editName").value,
                college: document.getElementById("editCollege").value,
                bio: document.getElementById("editBio").value,
                updated_at: new Date()
            };
            const { error } = await supabaseClient.from("profiles").update(updates).eq("id", currentUser.id);
            if (!error) { closeModal(); loadProfile(); toast("Profile Updated!"); }
        }

        async function uploadAvatar(input) {
            const file = input.files[0];
            const fileName = `avatars/${currentUser.id}-${Date.now()}`;
            await supabaseClient.storage.from("dormkart-assets").upload(fileName, file);
            const { data } = supabaseClient.storage.from("dormkart-assets").getPublicUrl(fileName);
            await supabaseClient.from("profiles").update({ avatar_url: data.publicUrl }).eq("id", currentUser.id);
            document.getElementById("userAvatar").src = data.publicUrl;
            toast("Photo Updated!");
        }

        // Helper Functions
        function openModal() { document.getElementById("editModal").style.display = "flex"; }
        function closeModal() { document.getElementById("editModal").style.display = "none"; }
        function toggleDarkMode() { document.body.classList.toggle("dark-mode"); }
        function filterInventory() {
            const q = document.getElementById("inventorySearch").value.toLowerCase();
            renderProducts(allProducts.filter(p => p.title.toLowerCase().includes(q)));
        }
        function updateProfileCompletion(p) {
            let s = 40; if(p.full_name) s+=20; if(p.bio) s+=20; if(p.college) s+=20;
            document.getElementById("progressFill").style.width = s+"%";
            document.getElementById("progressPercent").innerText = s+"%";
        }
        async function logout() { await supabaseClient.auth.signOut(); window.location = "index.html"; }
        function toast(m) { alert(m); } // Replace with your custom toast if needed

        initProfile();
    </script>
</body>
</html>
