<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DormKart Profile</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="config.js"></script>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#F8FAFC;
padding-bottom:90px;
}

.header{
background:#14B8A6;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.profile{
background:white;
padding:20px;
text-align:center;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid #14B8A6;
}

.btn{
background:#14B8A6;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.stats{
display:flex;
justify-content:space-around;
padding:15px;
background:white;
margin-top:10px;
}

.stat b{
display:block;
color:#14B8A6;
}

.search{
padding:10px;
margin:15px;
width:calc(100% - 30px);
border-radius:8px;
border:1px solid #ddd;
}

.listings{
padding:15px;
display:grid;
gap:12px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
display:flex;
gap:10px;
position:relative;
overflow:hidden;
}

.card img{
width:80px;
height:80px;
border-radius:8px;
object-fit:cover;
}

.actions button{
margin-right:5px;
border:none;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

.sold{background:#EF4444;color:white;}
.delete{background:#333;color:white;}

.swipe-actions{
position:absolute;
right:-120px;
top:0;
height:100%;
display:flex;
transition:0.3s;
}

.card.show .swipe-actions{
right:0;
}

.swipe-actions button{
width:60px;
color:white;
border:none;
}

.delete-btn{background:#EF4444;}
.sold-btn{background:#14B8A6;}

.chart{
padding:20px;
background:white;
margin:10px;
border-radius:10px;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid #eee;
}

.bottom-nav a{
text-decoration:none;
color:#666;
text-align:center;
}

.bottom-nav a.active{
color:#14B8A6;
}

.notif{
position:relative;
}

.notif span{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:10px;
padding:2px 5px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="header">

<h3>DormKart</h3>

<div class="notif">
<i class="material-icons">notifications</i>
<span id="notifCount">0</span>
</div>

</div>


<div class="profile">

<img id="avatar" class="avatar"
src="https://ui-avatars.com/api/?name=User">

<br>

<input type="file" id="avatarInput" hidden onchange="uploadAvatar(this)">

<button class="btn"
onclick="document.getElementById('avatarInput').click()">
Change Photo
</button>

<h2 id="name">Loading...</h2>

<p id="college"></p>

<p id="bio"></p>

<p>⭐ <span id="rating">0.0</span>
(<span id="reviews">0</span>)</p>

<button class="btn" onclick="openModal()">Edit Profile</button>

</div>


<div class="stats">

<div class="stat">
<b id="active">0</b>
Active
</div>

<div class="stat">
<b id="sold">0</b>
Sold
</div>

<div class="stat">
<b id="earnings">₹0</b>
Earned
</div>

</div>


<div class="chart">
<h3>Seller Analytics</h3>
<canvas id="analyticsChart"></canvas>
</div>


<input class="search"
placeholder="Search listings"
onkeyup="searchItems(this.value)">


<div class="listings" id="listings"></div>



<div class="bottom-nav">

<a href="dashboard.html">
<i class="material-icons">home</i><br>Home
</a>

<a href="add-product.html">
<i class="material-icons">add_box</i><br>Sell
</a>

<a href="chats.html">
<i class="material-icons">chat</i><br>Chat
</a>

<a href="profile.html" class="active">
<i class="material-icons">person</i><br>Profile
</a>

</div>


<script>

const supabaseClient =
supabase.createClient(
SUPABASE_CONFIG.url,
SUPABASE_CONFIG.key
)

let user
let products=[]

async function init(){

const {data:{session}} =
await supabaseClient.auth.getSession()

if(!session){
window.location="index.html"
return
}

user=session.user

loadProfile()
loadProducts()
loadReviews()
loadNotifications()

}

init()


async function loadProfile(){

const {data} =
await supabaseClient
.from("profiles")
.select("*")
.eq("id",user.id)
.single()

if(!data) return

document.getElementById("name").innerText=data.full_name||"User"
document.getElementById("college").innerText=data.college||""
document.getElementById("bio").innerText=data.bio||""

if(data.avatar_url)
document.getElementById("avatar").src=data.avatar_url

}


async function loadNotifications(){

const {data} =
await supabaseClient
.from("notifications")
.select("*")
.eq("user_id",user.id)
.eq("is_read",false)

document.getElementById("notifCount").innerText=data.length

}


async function loadReviews(){

const {data} =
await supabaseClient
.from("reviews")
.select("rating")
.eq("seller_id",user.id)

if(!data) return

let avg=0

if(data.length>0){
avg=data.reduce((a,b)=>a+b.rating,0)/data.length
}

document.getElementById("rating").innerText=avg.toFixed(1)
document.getElementById("reviews").innerText=data.length

}


async function loadProducts(){

const {data} =
await supabaseClient
.from("products")
.select("*")
.eq("seller_id",user.id)

products=data

renderProducts(data)
updateStats(data)
loadAnalytics(data)

}


function renderProducts(items){

const container=document.getElementById("listings")

container.innerHTML=""

items.forEach(p=>{

container.innerHTML+=`

<div class="card">

<img src="${p.image_url}">

<div>

<b>₹${p.price}</b>
<p>${p.title}</p>
<p>👁 ${p.views||0} views</p>

<div class="actions">

<button onclick="addWishlist('${p.id}')">❤️</button>

</div>

</div>

<div class="swipe-actions">

<button class="sold-btn"
onclick="toggleSold('${p.id}','${p.status}')">
Sold
</button>

<button class="delete-btn"
onclick="deleteItem('${p.id}')">
Delete
</button>

</div>

</div>

`

})

enableSwipe()

}


function enableSwipe(){

document.querySelectorAll(".card")
.forEach(card=>{

let startX=0

card.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

card.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

if(startX-endX>50){
card.classList.add("show")
}

if(endX-startX>50){
card.classList.remove("show")
}

})

})

}


function updateStats(items){

let active=0
let sold=0
let earnings=0

items.forEach(p=>{

if(p.status==="sold"){
sold++
earnings+=Number(p.price)
}else{
active++
}

})

document.getElementById("active").innerText=active
document.getElementById("sold").innerText=sold
document.getElementById("earnings").innerText="₹"+earnings

}


function loadAnalytics(data){

let active=data.filter(i=>i.status==="available").length
let sold=data.filter(i=>i.status==="sold").length

new Chart(document.getElementById("analyticsChart"),{
type:"bar",
data:{
labels:["Active","Sold"],
datasets:[{
data:[active,sold]
}]
}
})

}


async function addWishlist(id){

await supabaseClient
.from("wishlist")
.insert({
user_id:user.id,
product_id:id
})

alert("Added to wishlist")

}


async function toggleSold(id,status){

const newStatus =
status==="sold"?"available":"sold"

await supabaseClient
.from("products")
.update({status:newStatus})
.eq("id",id)

loadProducts()

}


async function deleteItem(id){

if(!confirm("Delete item?")) return

await supabaseClient
.from("products")
.delete()
.eq("id",id)

loadProducts()

}


function searchItems(q){

q=q.toLowerCase()

renderProducts(
products.filter(p =>
p.title.toLowerCase().includes(q)
)
)

}


async function uploadAvatar(input){

const file=input.files[0]

const fileName=user.id+"-"+Date.now()

await supabaseClient
.storage
.from("dormkart-assets")
.upload(fileName,file)

const {data} =
supabaseClient
.storage
.from("dormkart-assets")
.getPublicUrl(fileName)

await supabaseClient
.from("profiles")
.update({avatar_url:data.publicUrl})
.eq("id",user.id)

document.getElementById("avatar").src=data.publicUrl

}

</script>

</body>
</html>
