<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Profile | DormKart</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #14B8A6;
            --primary-dark: #0D9488;
            --primary-soft: rgba(20, 184, 166, 0.1);
            --bg-body: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body.dark-mode {
            --bg-body: #0F172A;
            --card-bg: #1E293B;
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); padding-bottom: 100px; transition: 0.3s; }

        /* App Bar */
        .app-bar {
            background: var(--card-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        /* Profile Header */
        .header-section {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 0 0 24px 24px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .profile-top { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; }
        
        .avatar-wrapper {
            position: relative;
            width: 85px; height: 85px;
        }
        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%; object-fit: cover;
            border: 3px solid var(--primary);
        }
        .change-photo-btn {
            position: absolute; bottom: 0; right: 0;
            background: var(--primary); color: white;
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--card-bg); cursor: pointer;
        }

        .rating-chip {
            display: inline-flex; align-items: center; gap: 4px;
            background: #FFFBEB; color: #B45309;
            padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 12px; padding: 0 20px; margin-top: -35px; margin-bottom: 25px;
        }
        .stat-card {
            background: var(--card-bg); padding: 15px; border-radius: 16px;
            text-align: center; box-shadow: var(--shadow); border: 1px solid var(--border);
        }
        .stat-card b { display: block; font-size: 18px; color: var(--primary); }
        .stat-card span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }

        /* Listing Cards */
        .listings-container { padding: 0 20px; display: grid; gap: 15px; }
        .product-card {
            background: var(--card-bg); border-radius: 16px; padding: 12px;
            display: flex; gap: 15px; border: 1px solid var(--border);
        }
        .product-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
        .product-info { flex: 1; }
        .price-tag { color: var(--primary); font-weight: 700; font-size: 16px; }

        /* Modal Styles */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content {
            background: var(--card-bg); width: 90%; max-width: 400px;
            padding: 24px; border-radius: 20px;
        }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--text-muted); }
        .input-group input, .input-group textarea {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--bg-body); color: var(--text-main);
        }

        .btn-primary {
            background: var(--primary); color: white; border: none;
            width: 100%; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: var(--card-bg);
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid var(--border); z-index: 1000;
        }
        .nav-item { text-decoration: none; color: var(--text-muted); text-align: center; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { display: block; font-size: 24px; }
        .nav-item span { font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="app-bar">
        <i class="material-icons" onclick="toggleDarkMode()">dark_mode</i>
        <h2 style="font-size: 18px; color: var(--primary);">My Profile</h2>
        <i class="material-icons" onclick="logout()">logout</i>
    </div>

    <div class="header-section">
        <div class="profile-top">
            <div class="avatar-wrapper">
                <img src="https://ui-avatars.com/api/?name=User" id="displayAvatar" class="avatar">
                <label for="fileInput" class="change-photo-btn"><i class="material-icons" style="font-size: 16px;">edit</i></label>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="uploadProfileImg(this)">
            </div>
            <div class="info">
                <h2 id="displayName">Dorm Member</h2>
                <p id="displayCollege" style="font-size: 13px; color: var(--text-muted);">University Name</p>
                <div class="rating-chip">
                    <i class="material-icons" style="font-size: 14px;">star</i>
                    <span id="avgRating">0.0</span> <span style="font-weight: 400; opacity: 0.6;">(<span id="reviewCount">0</span> reviews)</span>
                </div>
            </div>
        </div>
        <p id="displayBio" style="font-size: 13px; color: var(--text-muted); margin-bottom: 15px;">Welcome to my shop!</p>
        <button class="btn-primary" onclick="openModal()">Edit Profile</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><b id="statActive">0</b><span>Active</span></div>
        <div class="stat-card"><b id="statSold">0</b><span>Sold</span></div>
        <div class="stat-card"><b id="statEarnings">₹0</b><span>Earnings</span></div>
    </div>

    <h3 style="padding: 0 20px 10px; font-size: 16px;">My Listings</h3>
    <div class="listings-container" id="listingsWrapper">
        </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">Edit Profile</h3>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="editName">
            </div>
            <div class="input-group">
                <label>College</label>
                <input type="text" id="editCollege">
            </div>
            <div class="input-group">
                <label>Bio</label>
                <textarea id="editBio" rows="3"></textarea>
            </div>
            <button class="btn-primary" onclick="saveProfile()">Save Changes</button>
            <button style="background:transparent; border:none; width:100%; margin-top:10px; color:var(--text-muted);" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="material-icons">grid_view</i><span>Home</span></a>
        <a href="add-product.html" class="nav-item"><i class="material-icons">add_box</i><span>Sell</span></a>
        <a href="chats.html" class="nav-item"><i class="material-icons">forum</i><span>Chats</span></a>
        <a href="#" class="nav-item active"><i class="material-icons">person</i><span>Profile</span></a>
    </nav>

    <script>
        const _supabase = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key);
        let userId = null;

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) return window.location.href = "index.html";
            userId = session.user.id;
            
            fetchProfile();
            fetchReviews();
            fetchInventory();
        }

        async function fetchProfile() {
            const { data: p } = await _supabase.from('profiles').select('*').eq('id', userId).single();
            if (p) {
                document.getElementById('displayName').innerText = p.full_name || 'User';
                document.getElementById('displayCollege').innerText = p.college || 'No college set';
                document.getElementById('displayBio').innerText = p.bio || 'No bio yet.';
                if (p.avatar_url) document.getElementById('displayAvatar').src = p.avatar_url;
                
                // Fill modal inputs
                document.getElementById('editName').value = p.full_name || '';
                document.getElementById('editCollege').value = p.college || '';
                document.getElementById('editBio').value = p.bio || '';
            }
        }

        async function fetchReviews() {
            const { data: reviews } = await _supabase.from('reviews').select('rating').eq('seller_id', userId);
            if (reviews && reviews.length > 0) {
                const avg = reviews.reduce((acc, curr) => acc + curr.rating, 0) / reviews.length;
                document.getElementById('avgRating').innerText = avg.toFixed(1);
                document.getElementById('reviewCount').innerText = reviews.length;
            }
        }

        async function fetchInventory() {
            const { data: products } = await _supabase.from('products').select('*').eq('seller_id', userId);
            const wrapper = document.getElementById('listingsWrapper');
            wrapper.innerHTML = '';
            
            let active = 0, sold = 0, earnings = 0;

            products.forEach(p => {
                if(p.status === 'Sold') { sold++; earnings += Number(p.price); } else { active++; }
                
                wrapper.innerHTML += `
                    <div class="product-card">
                        <img src="${p.image_url}" class="product-img">
                        <div class="product-info">
                            <div class="price-tag">₹${p.price}</div>
                            <div style="font-size:14px; font-weight:600;">${p.title}</div>
                            <div style="font-size:11px; color:var(--text-muted); margin-top:4px;">
                                Status: <span style="color:${p.status === 'Sold' ? '#EF4444' : '#14B8A6'}">${p.status}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('statActive').innerText = active;
            document.getElementById('statSold').innerText = sold;
            document.getElementById('statEarnings').innerText = '₹' + earnings;
        }

        async function uploadProfileImg(input) {
            const file = input.files[0];
            const fileExt = file.name.split('.').pop();
            const filePath = `avatars/${userId}-${Math.random()}.${fileExt}`;

            // 1. Upload to Supabase Storage
            const { error: uploadError } = await _supabase.storage
                .from('dormkart-assets') // Make sure this bucket exists and is public
                .upload(filePath, file);

            if (uploadError) return alert('Upload failed');

            // 2. Get Public URL
            const { data: { publicUrl } } = _supabase.storage.from('dormkart-assets').getPublicUrl(filePath);

            // 3. Update Profile table
            await _supabase.from('profiles').update({ avatar_url: publicUrl }).eq('id', userId);
            document.getElementById('displayAvatar').src = publicUrl;
        }

        async function saveProfile() {
            const updates = {
                full_name: document.getElementById('editName').value,
                college: document.getElementById('editCollege').value,
                bio: document.getElementById('editBio').value,
                updated_at: new Date()
            };

            const { error } = await _supabase.from('profiles').update(updates).eq('id', userId);
            if (!error) {
                closeModal();
                fetchProfile();
            }
        }

        function openModal() { document.getElementById('editModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        init();
    </script>
</body>
</html>
